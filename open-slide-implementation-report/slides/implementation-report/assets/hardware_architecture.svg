<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="980" viewBox="0 0 1920 980">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .core { fill: none; stroke: #cfc6b8; stroke-width: 2.5; rx: 16; }
      .box { fill: #f8fafb; stroke: #cfd6df; stroke-width: 2; rx: 10; }
      .box2 { fill: #eef2f4; stroke: #c2cbd5; stroke-width: 2; rx: 10; }
      .paper { fill: #fff8ee; stroke: #d8cfc0; stroke-width: 2; rx: 8; }
      .title { fill: #20242a; font: 800 40px "Aptos Display", "Microsoft JhengHei", Arial, sans-serif; }
      .label { fill: #20242a; font: 800 26px "Aptos", "Microsoft JhengHei", Arial, sans-serif; }
      .small { fill: #56606b; font: 18px "Aptos", "Microsoft JhengHei", Arial, sans-serif; }
      .mono { fill: #20242a; font: 18px "Aptos Mono", Consolas, monospace; }
      .dark { fill: #202026; font: 800 22px "Aptos", "Microsoft JhengHei", Arial, sans-serif; }
      .darkSmall { fill: #4f4941; font: 17px "Aptos", "Microsoft JhengHei", Arial, sans-serif; }
      .tag { fill: #c9783e; font: 800 17px "Aptos Mono", Consolas, monospace; letter-spacing: 1.5px; }
      .data { fill: none; stroke: #4e8dba; stroke-width: 3.2; marker-end: url(#dataArrow); }
      .ctrl { fill: none; stroke: #c9783e; stroke-width: 2.8; marker-end: url(#ctrlArrow); }
      .stat { fill: none; stroke: #39a36a; stroke-width: 2.8; marker-end: url(#statArrow); }
      .thin { fill: none; stroke: #cbd3dc; stroke-width: 2.5; }
    </style>
    <marker id="dataArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#4e8dba"/>
    </marker>
    <marker id="ctrlArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#c9783e"/>
    </marker>
    <marker id="statArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#39a36a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="980"/>

  <line x1="70" y1="62" x2="120" y2="62" stroke="#c9783e" stroke-width="3"/>
  <text class="tag" x="140" y="68">HARDWARE ARCHITECTURE</text>
  <text class="title" x="70" y="126">Sparse Attention Core - Orthogonal Dataflow View</text>
  <text class="small" x="70" y="160">Only horizontal and vertical routes are used: orange = configuration/control, blue = Q-K pair and score data, green = statistics.</text>

  <rect class="core" x="270" y="210" width="1380" height="650"/>
  <text class="tag" x="300" y="246">sparse_attention_core.v</text>

  <rect class="box" x="70" y="330" width="160" height="240"/>
  <text class="label" x="98" y="372">Inputs</text>
  <text class="mono" x="98" y="418">clk / rst_n</text>
  <text class="mono" x="98" y="454">start</text>
  <text class="mono" x="98" y="490">cfg_seq_len</text>
  <text class="mono" x="98" y="526">mode[2:0]</text>

  <rect class="box" x="1690" y="318" width="170" height="300"/>
  <text class="label" x="1718" y="360">Outputs</text>
  <text class="mono" x="1718" y="406">done</text>
  <text class="mono" x="1718" y="442">pair_valid</text>
  <text class="mono" x="1718" y="478">q_idx / k_idx</text>
  <text class="mono" x="1718" y="514">score_valid</text>
  <text class="mono" x="1718" y="550">score</text>
  <text class="mono" x="1718" y="586">counters</text>

  <rect class="box" x="330" y="300" width="470" height="390"/>
  <text class="label" x="365" y="342">QK Pair Streamer</text>
  <text class="small" x="365" y="372">qk_pair_streamer.v</text>

  <rect class="box2" x="365" y="420" width="190" height="130"/>
  <text class="label" x="392" y="464">Pattern</text>
  <text class="label" x="392" y="498">Controller</text>
  <text class="small" x="392" y="528">q_idx, k_idx, phase</text>

  <rect class="paper" x="600" y="390" width="160" height="68"/>
  <text class="dark" x="626" y="426">Block LB</text>
  <text class="darkSmall" x="626" y="448">sliding / dilated</text>
  <rect class="paper" x="600" y="478" width="160" height="68"/>
  <text class="dark" x="626" y="514">Global LB</text>
  <text class="darkSmall" x="626" y="536">global token</text>
  <rect class="paper" x="600" y="566" width="160" height="68"/>
  <text class="dark" x="626" y="602">Row LB</text>
  <text class="darkSmall" x="626" y="624">global row</text>

  <rect class="box" x="910" y="320" width="260" height="150"/>
  <text class="label" x="950" y="364">Stats Counter</text>
  <text class="small" x="950" y="398">stats_counter.v</text>
  <text class="mono" x="950" y="432">pair / cycle / mac</text>

  <rect class="box" x="910" y="545" width="360" height="190"/>
  <text class="label" x="950" y="590">QK Dot Accumulator</text>
  <text class="small" x="950" y="624">qk_dot_accumulator.v</text>
  <rect class="paper" x="942" y="660" width="94" height="44"/>
  <text class="dark" x="960" y="689">lane0</text>
  <rect class="paper" x="1052" y="660" width="94" height="44"/>
  <text class="dark" x="1070" y="689">lane1</text>
  <rect class="paper" x="1162" y="660" width="94" height="44"/>
  <text class="dark" x="1180" y="689">lane3</text>

  <rect class="box2" x="1385" y="430" width="200" height="210"/>
  <text class="label" x="1424" y="478">Output</text>
  <text class="label" x="1424" y="512">Registers</text>
  <text class="small" x="1424" y="552">align score path</text>
  <text class="small" x="1424" y="580">2-cycle done delay</text>

  <rect x="330" y="735" width="470" height="58" fill="#f8fafb" stroke="#cfd6df" stroke-width="2" rx="8"/>
  <text class="small" x="365" y="770">Modes: full, sliding, dilated, sliding_global, butterfly</text>
  <rect x="910" y="775" width="675" height="58" fill="#f8fafb" stroke="#cfd6df" stroke-width="2" rx="8"/>
  <text class="small" x="950" y="810">pair_valid drives counters; q_idx/k_idx drive FEATURE_DIM dot-product lanes</text>

  <!-- Input to streamer / controller -->
  <path class="ctrl" d="M230 450 H300 V485 H365"/>
  <path class="ctrl" d="M230 490 H300 V485"/>
  <path class="ctrl" d="M230 530 H300 V485"/>

  <!-- Pattern controller to line buffers -->
  <path class="ctrl" d="M555 455 H580 V424 H600"/>
  <path class="ctrl" d="M555 485 H580 V512 H600"/>
  <path class="ctrl" d="M555 515 H580 V600 H600"/>

  <!-- Streamer valid pair to stats and dot accumulator -->
  <path class="data" d="M800 420 H860 V395 H910"/>
  <path class="data" d="M800 610 H860 V640 H910"/>

  <!-- Pair data to QK dot lanes -->
  <path class="data" d="M800 520 H850 V640 H910"/>

  <!-- Statistics to output -->
  <path class="stat" d="M1170 395 H1290 V720 H1690"/>

  <!-- Score path to output registers then output -->
  <path class="data" d="M1270 640 H1385"/>
  <path class="data" d="M1585 535 H1690"/>

  <!-- Done / control status to output registers -->
  <path class="ctrl" d="M800 350 H850 V260 H1362 V500 H1385"/>

  <!-- Output register to external output bus -->
  <path class="data" d="M1585 470 H1690"/>
  <path class="data" d="M1585 550 H1690"/>

  <!-- Internal alignment guides -->
  <line class="thin" x1="860" y1="300" x2="860" y2="735"/>
  <line class="thin" x1="1290" y1="300" x2="1290" y2="735"/>
  <line class="thin" x1="1362" y1="300" x2="1362" y2="735"/>

  <text class="mono" x="820" y="386">raw_pair_valid</text>
  <text class="mono" x="820" y="512">q_idx / k_idx</text>
  <text class="mono" x="1210" y="382">counts</text>
  <text class="mono" x="1288" y="628">attention_score</text>
  <text class="mono" x="1212" y="492">raw_done</text>

  <line x1="70" y1="922" x2="250" y2="922" stroke="#cfd6df" stroke-width="2"/>
  <text class="small" x="70" y="952">Source: RTL/Rtl/sparse_attention_core.v, qk_pair_streamer.v, pattern_controller.v, KV_LBV2.v</text>
</svg>
