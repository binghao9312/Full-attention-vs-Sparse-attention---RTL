<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparse Attention RTL 電路與架構分析</title>
    <!-- Importing futuristic fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #090d16;
            --bg-panel: rgba(20, 28, 47, 0.6);
            --border-color: rgba(59, 130, 246, 0.2);
            --border-focus: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Module-specific theme colors */
            --color-ctrl: #fbbf24;      /* Amber-400 */
            --color-mem: #10b981;       /* Emerald-500 */
            --color-alu: #3b82f6;       /* Blue-500 */
            --color-soft: #ec4899;      /* Pink-500 */
            --color-stats: #84cc16;     /* Lime-500 (黃綠色) */
            
            --glow-color: rgba(59, 130, 246, 0.3);
        }

        * {
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(20, 30, 60, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 15, 60, 0.2) 0px, transparent 50%);
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
        }

        .version-badge {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 4px;
            color: #3b82f6;
            font-size: 13px;
        }

        /* Tabs styling */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab-btn {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-main);
            border-color: var(--border-focus);
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            color: var(--text-main);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
        }

        /* Dashboard layout grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 24px;
            flex-grow: 1;
            height: calc(100vh - 160px);
            min-height: 500px;
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        /* Canvas (SVG Drawing Area) */
        .canvas-container {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s;
        }

        .canvas-container:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .canvas-placeholder {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-muted);
            padding: 40px;
        }

        .canvas-placeholder h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        /* Info Explanation Panel */
        .info-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .info-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .info-title {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-body {
            line-height: 1.6;
            color: var(--text-muted);
            font-size: 14px;
        }

        .info-body p {
            margin: 0 0 12px 0;
        }

        /* Custom scrollbar styling for webkit */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-focus);
        }

        /* Animation */
        .tab-content-wrapper {
            width: 100%;
            height: 100%;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Dynamic SVG Interactive Styles */
        .module-box { cursor: pointer; transition: all 0.3s ease; }
        .module-box rect { transition: all 0.3s ease; transform-box: fill-box; transform-origin: center; }
        .module-box:hover rect { filter: drop-shadow(0 0 8px var(--glow-color, #3b82f6)); transform: translateY(-2px); }
        .signal-line { stroke: rgba(255, 255, 255, 0.25); stroke-width: 2; fill: none; transition: all 0.2s ease; }
        .signal-group { cursor: pointer; }
        .signal-group:hover .signal-line { stroke: #3b82f6; stroke-width: 3; filter: drop-shadow(0 0 5px #3b82f6); marker-end: url(#arrow-blue); }
        .signal-group:hover text { fill: #3b82f6; font-weight: bold; }
        .signal-group:hover path { stroke: #3b82f6; }
    </style>

                                <li><strong>qk_pair_streamer:</strong> 動態產生需計算 Query/Key Pair 的索引，藉由 Line Buffer 架構快取所需的 Key 指標。</li>
                                <li><strong>qkv_feature_mem:</strong> 包含三組獨立的 SRAM，分別存放 Q、K、V 特徵向量，支援雙埠讀寫與平行特徵向量輸出。</li>
                                <li><strong>qk_dot_accumulator:</strong> 高效管線化點積運算單元，平行讀取 Q/K 特徵向量並進行矩陣乘法累加。</li>
                                <li><strong>sparse_softmax_sv:</strong> 實作 Online Softmax 演算法與分母除法，並隨後與 V 特徵向量進行加權累加，輸出 Context Vector。</li>
                                <li><strong>stats_counter:</strong> 監控電路效能，即時統計運算配對數、執行週期數與乘加次數。</li>
                                <li><strong>Result FIFO:</strong> 緩衝輸出數據，提供 16 字深度之環狀佇列，解耦主機讀取與加速核計算。</li>
                            </ul>

                             <h3 style="color:#fbbf24; margin-top:16px; font-size:15px; border-bottom:1px solid rgba(251,191,36,0.3); padding-bottom:4px;">自適應 Pipeline 握手與反向阻塞機制 (advance_ready)</h3>
                             <p>本晶片所有暫存器階段和控制邏輯皆與內部 <code>advance_ready</code> (對應電路中的 <code>pipeline_ready</code>) 握手訊號同步：</p>
                             <ul style="padding-left: 20px; line-height: 1.8; margin-top: 6px;">
                               <li><strong>控制源頭:</strong> <code>pipeline_ready = score_ready && softmax_score_ready</code>。因為點積輸出準備就緒訊號 <code>score_ready</code> 固定為 1，因此握手致能主要取決於 <code>softmax_score_ready</code>，即在線 Softmax 狀態機是否處於 <code>STATE_COLLECT</code> 狀態。</li>
                               <li><strong>反向阻塞傳播:</strong> 當 Softmax 正在進行行權重重縮放 (<code>STATE_UPDATE</code>)、16週期的位序列除法運算 (<code>STATE_DIVIDE</code>) 或下游結果 FIFO 已滿 (<code>fifo_full = 1</code>) 時，<code>softmax_score_ready</code> 將拉低為 0。這會使點積管線的所有階段暫存器 (Stage 0, 1, 2) 寫入致能被同步關閉，資料凍結；同時 <code>qk_pair_streamer</code> 停止產生新配對索引，qkv_feature_mem SRAM 暫停讀取。</li>
                               <li><strong>優勢:</strong> 此握手機制實現了全硬體級自適應時序調整。無論 Host 讀出結果多慢，或除法運算多費時，均能保證前級高速管線數據不丟失。</li>
                             </ul>

                             <p>本設計採用唯讀查表 (ROM LUT) 機制進行自然指數 $e^{-x}$ 的近似運算：</p>

                               <li><strong>差值縮放:</strong> 當 Stage 2 點積分數 <code>score_value</code> 抵達時，計算其與該行 Query 當前最大值 <code>row_max</code> 的絕對差值，並右移 <code>SCORE_SCALE_SHIFT = 1</code> 位元進行縮放（相當於除以 2，對應 $\sqrt{d_{model}} = 2$ 縮放）：<code>incoming_delta = |score_value - row_max| >> 1</code>。</li>
                               <li><strong>查表映射:</strong> 使用 <code>incoming_delta</code> 定址 <code>exp_lut</code>。內部 ROM 包含了 12 組 Q0.16 定點數格式的自然指數近似值：0對應65535 ($e^0 pprox 1.0$), 1對應24109 ($e^{-0.5} pprox 0.367$), 2對應8869 ($e^{-1.0} pprox 0.135$)... 當差值 $\ge 11$ 時，指數值趨近於 0，查表直接返回 0。這使得指數計算僅需 1 個週期即可完成。</li>
                             </ul>

                             <h3 style="color:#ec4899; margin-top:16px; font-size:15px; border-bottom:1px solid rgba(236,72,153,0.3); padding-bottom:4px;">2. Weighted Sum 累加與動態重縮放</h3>
                             <p>隨著點積分數流式輸入，行指數和 <code>row_exp_sum</code> 與加權特徵累加值 <code>row_weighted_sum</code> 必須即時動態更新。當新分數進來時，會出現兩種情況：</p>
                             <ul style="padding-left: 20px; line-height: 1.8; margin-top: 6px;">
                               <li><strong>情況 A: 新分數大於當前最大值 (score_value > row_max)</strong><br>
                                 此時觸發<strong>重縮放 (Rescaling) 機制</strong>。舊的最大值已失效，因此原本已累加的 <code>row_weighted_sum</code> 必須乘上當前權重差值進行衰減：<code>rescaled_weighted_sum = (row_weighted_sum * incoming_weight) >> 16</code> (其中 <code>incoming_weight = e^{row_max - score_value}</code>)，再加上新 Value 特徵的貢獻：<code>rescaled_weighted_sum + (EXP_ONE * update_v)</code>。同時更新 <code>row_exp_sum</code> 為舊和經衰減後加上 1。
                               </li>
                               <li><strong>情況 B: 新分數小於或等於當前最大值 (score_value <= row_max)</strong><br>
                                 舊的最大值仍然有效，無需對已有的累加值進行回溯衰減，直接將新點積分數經查表得到的權重與新 Value 進行乘加累加即可：<code>row_weighted_sum <= row_weighted_sum + (incoming_weight * update_v)</code>。同時將 <code>incoming_weight</code> 直接累加至 <code>row_exp_sum</code>。
                               </li>
                             </ul>

                             <h3 style="color:#ec4899; margin-top:16px; font-size:15px; border-bottom:1px solid rgba(236,72,153,0.3); padding-bottom:4px;">3. 位序列恢復餘數除法器 (Bit-Serial Restoring Divider)</h3>
                             <p>本在線 Softmax 電路內建一個 16週期恢復餘數串列除法器，以最小化硬體面積：</p>
                             <ul style="padding-left: 20px; line-height: 1.8; margin-top: 6px;">
                               <li><strong>初始化 (STATE_PREPARE):</strong> 將分子 <code>row_weighted_sum</code> 左移 8 位元（<code>OUTPUT_FRAC_BITS = 8</code>）作為 48-bit 餘數暫存器 <code>division_remainder</code> 的初始值，以取得 Q8.8 定點數格式的輸出；分母 <code>row_exp_sum</code> 載入 <code>division_denominator</code>；除法計數器 <code>division_bit</code> 初始化為 15，商暫存器 <code>division_quotient</code> 清零。</li>
                               <li><strong>逐位除法 (STATE_DIVIDE):</strong> 電路在 <code>STATE_DIVIDE</code> 狀態下運作 16 個週期。在每一時脈週期，比較器判斷 <code>division_remainder >= (division_denominator << division_bit)</code>：
                                 <ul>
                                   <li>若成立：餘數減去移位後的除數（<code>division_remainder <= division_remainder - shifted_divisor</code>），且商的對應位元 <code>division_quotient[division_bit]</code> 設為 1。</li>
                                   <li>若不成立：餘數保持不變（即**恢復餘數**，Restoring），且商的該位元 <code>division_quotient[division_bit]</code> 設為 0。</li>
                                 </ul>
                                 隨後 <code>division_bit</code> 減 1，直至遞減到 0，完成所有 16 位元的商運算，隨後輸出鎖存並拉高 <code>context_valid</code>。
                               </li>
                             </ul>

                             <h3 style="color:#ec4899; margin-top:16px; font-size:15px; border-bottom:1px solid rgba(236,72,153,0.3); padding-bottom:4px;">4. 在線 Softmax 狀態機 (FSM)</h3>

                                 <li><code>PREPARE (3'd2)</code>: 初始化除法器的暫存器，設定商和餘數，並設定除法計數器為 15。</li>
                                 <li><code>DIVIDE (3'd3)</code>: 恢復餘數除法計算，利用逐位減法與移位，在 16 個時脈週期內求出商。</li>
                                 <li><code>OUTPUT (3'd4)</code>: 商鎖存至輸出暫存器，拉高 <code>context_valid</code>，將資料送出，在 context_ready 握手後進入下一輪。</li>

                             <h2 class="info-title">
                                 <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:#84cc16; box-shadow: 0 0 8px #84cc16;"></span>
                                 Stats & Result FIFO 詳細說明
                             </h2>
                         </div>
                         <div class="info-body">
                             <p>本分頁展示了系統中的<strong>效能統計計數器 (stats_counter)</strong> 與<strong>結果快取佇列 (Result FIFO)</strong> 的 RTL 硬體細節與運作機制。這兩個模組負責監控運算效能並快取計算結果，以進行外部總線 Readout：</p>
                             <ul style="padding-left: 20px; line-height: 1.8; margin-top: 10px;">
                                 <li><strong>效能統計計數器 (stats_counter) 運作特性:</strong> 包含三個獨立的 32位元累加暫存器：
                                     <ul style="padding-left: 15px; margin-top: 5px;">
                                         <li><code>pair_count</code>: 記錄實際計算的 Query-Key 配對總量。每當 <code>pair_valid && pipeline_ready</code> 在時脈沿為高電平時，計數器遞增 1。</li>
                                         <li><code>cycle_count</code>: 記錄加速器注意力計算的有效時脈週期。<strong>此計數器依據 <code>pair_valid</code> 累加</strong>（非無條件隨 clock 遞增），只有在該週期內有有效配對計算時才加 1。這能精確反應出排除 Stall 後的有效計算週期數。</li>
                                         <li><code>mac_count</code>: 記錄總乘加操作次數。每當 <code>pair_valid</code> 為高時，該計數器自動累加 <code>MACS_PER_PAIR = 4</code>。</li>
                                     </ul>
                                 </li>
                                 <li><strong>結果 FIFO 緩衝區 (Result FIFO):</strong> 實作於 <code>chip_top.v</code> 中，為一個深度為 16 words、寬度為 26-bit 的環狀佇列 (Circular Queue)：
                                     <ul style="padding-left: 15px; margin-top: 5px;">
                                         <li><strong>寫入端 (Push):</strong> 當 Softmax 模組輸出 <code>core_context_valid</code> 且 FIFO 未滿 (<code>!fifo_full</code>，即 <code>core_context_ready = 1</code>) 時，將 <code>core_context_q_idx</code>、<code>core_context_feature_idx</code> 及 16位元定點數 <code>core_context_value</code> 寫入 <code>fifo_wr_ptr</code> 指向的槽位，並更新 <code>fifo_wr_ptr</code>。</li>
                                         <li><strong>讀取端 (Pop):</strong> 外部 Host 透過 APB 總線發起讀取。當寫入 1 到 <code>ADDR_RESULT_POP (0x0E)</code> 時，觸發 <code>fifo_pop_req</code>，使 <code>fifo_rd_ptr</code> 指向的值被彈出，並更新 <code>fifo_count</code>。</li>
                                         <li><strong>空滿標誌與反壓:</strong> 藉由 <code>fifo_count</code> 動態計算。若 <code>fifo_count == 16</code> 則拉高 <code>fifo_full</code> 並將 <code>core_context_ready</code> 拉低，暫停上游管線；若 <code>fifo_count == 0</code> 則拉高 <code>fifo_empty</code> 暫停主機讀取。</li>
                                     </ul>
                                 </li>
                             </ul>
                             <p style="margin-top: 16px; font-size: 13px; color: var(--text-muted);">本設計透過 Result FIFO 有效解耦了運算核心的高速計算與 APB 總線的慢速讀取，避免主機讀取延遲導致運算核心頻繁停頓。</p>
                         </div>
                     </div>
                 `;
            } else {
                canvasArea.innerHTML = `

                            電路連線、波形及暫存器視窗將在後續 Task 中完成實作。
                        </div>
                    </div>
                `;

                infoArea.innerHTML = `
                    <div class="tab-content-wrapper">
                        <div class="info-header">
                            <h2 class="info-title">
                                <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:#3b82f6; box-shadow: 0 0 8px #3b82f6;"></span>
                                ${activeTab.name} 詳細說明
                            </h2>
                        </div>
                        <div class="info-body">
                            <p>這是 <strong>${activeTab.name}</strong> 的架構與說明區塊。本頁籤對應的硬體 RTL 電路包含以下特點：</p>
                            <ul style="padding-left: 20px; line-height: 1.8; margin-top: 10px;">
                                <li>模組識別標識符: <code style="font-family: monospace; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; color: #f8fafc;">${tabId}</code></li>
                                <li>自適應介面握手訊號：支援同步時脈與複位設定。</li>
                                <li>管線式架構：高吞吐量設計以加速晶片內運算效率。</li>
                            </ul>
                            <p style="margin-top: 16px; font-size: 13px; color: var(--text-muted);">請點擊上方導覽列切換不同頁籤以測試 Tab 切換功能。</p>
                        </div>
                    </div>
                `;
            }
        }

        // Bind onload
        window.onload = initTabs;
    </script>
