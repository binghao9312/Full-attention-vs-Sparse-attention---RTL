<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparse Attention RTL 電路與架構分析</title>
    <!-- Importing futuristic fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #090d16;
            --bg-panel: rgba(20, 28, 47, 0.6);
            --border-color: rgba(59, 130, 246, 0.2);
            --border-focus: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Module-specific theme colors */
            --color-ctrl: #fbbf24;      /* Amber-400 */
            --color-mem: #10b981;       /* Emerald-500 */
            --color-alu: #3b82f6;       /* Blue-500 */
            --color-soft: #ec4899;      /* Pink-500 */
            --color-stats: #84cc16;     /* Lime-500 (黃綠色) */
            
            --glow-color: rgba(59, 130, 246, 0.3);
        }

        * {
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(20, 30, 60, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 15, 60, 0.2) 0px, transparent 50%);
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
        }

        .version-badge {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 4px;
            color: #3b82f6;
            font-size: 13px;
        }

        /* Tabs styling */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab-btn {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-main);
            border-color: var(--border-focus);
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            color: var(--text-main);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
        }

        /* Dashboard layout grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 24px;
            flex-grow: 1;
            height: calc(100vh - 160px);
            min-height: 500px;
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        /* Canvas (SVG Drawing Area) */
        .canvas-container {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s;
        }

        .canvas-container:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .canvas-placeholder {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-muted);
            padding: 40px;
        }

        .canvas-placeholder h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        /* Info Explanation Panel */
        .info-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .info-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .info-title {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-body {
            line-height: 1.6;
            color: var(--text-muted);
            font-size: 14px;
        }

        .info-body p {
            margin: 0 0 12px 0;
        }

        /* Custom scrollbar styling for webkit */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-focus);
        }

        /* Animation */
        .tab-content-wrapper {
            width: 100%;
            height: 100%;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Dynamic SVG Interactive Styles */
        .module-box { cursor: pointer; transition: all 0.3s ease; }
        .module-box rect { transition: all 0.3s ease; transform-box: fill-box; transform-origin: center; }
        .module-box:hover rect { filter: drop-shadow(0 0 8px var(--glow-color, #3b82f6)); transform: translateY(-2px); }
        .signal-line { stroke: rgba(255, 255, 255, 0.25); stroke-width: 2; fill: none; transition: all 0.2s ease; }
        .signal-group { cursor: pointer; }
        .signal-group:hover .signal-line { stroke: #3b82f6; stroke-width: 3; filter: drop-shadow(0 0 5px #3b82f6); marker-end: url(#arrow-blue); }
        .signal-group:hover text { fill: #3b82f6; font-weight: bold; }
        .signal-group:hover path { stroke: #3b82f6; }
    </style>
</head>

        // Tab initialization

            const nav = document.getElementById('tab-nav');
            tabsConfig.forEach((tab, index) => {

                btn.textContent = tab.name;
                btn.onclick = () => switchTab(tab.id);
                btn.dataset.id = tab.id;
                nav.appendChild(btn);

            // Render initial tab content
            switchTab('overview');

            document.querySelectorAll('.tab-btn').forEach(btn => {

                infoArea.innerHTML = `
                    <div class="tab-content-wrapper">

                                系統總覽 (Overview) 詳細說明
                            </h2>
                        </div>
                        <div class="info-body">
                            <p>本晶片設計為<strong>稀疏注意力機制 (Sparse Attention Core)</strong> 的硬體加速器，旨在解決傳統 Full Attention 在長文本下計算量大與記憶體頻寬受限的瓶頸。硬體架構由以下主要部分組成：</p>
