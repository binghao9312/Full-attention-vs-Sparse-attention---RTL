<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparse Attention RTL 電路與架構分析</title>
    <!-- Importing futuristic fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #090d16;
            --bg-panel: rgba(20, 28, 47, 0.6);
            --border-color: rgba(59, 130, 246, 0.2);
            --border-focus: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Module-specific theme colors */
            --color-ctrl: #fbbf24;      /* Amber-400 */
            --color-mem: #10b981;       /* Emerald-500 */
            --color-alu: #3b82f6;       /* Blue-500 */
            --color-soft: #ec4899;      /* Pink-500 */
            --color-stats: #8b5cf6;     /* Purple-500 */
            
            --glow-color: rgba(59, 130, 246, 0.3);
        }

        * {
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(20, 30, 60, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 15, 60, 0.2) 0px, transparent 50%);
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
        }

        .version-badge {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 4px;
            color: #3b82f6;
            font-size: 13px;
        }

        /* Tabs styling */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab-btn {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-main);
            border-color: var(--border-focus);
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            color: var(--text-main);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
        }

        /* Dashboard layout grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 24px;
            flex-grow: 1;
            height: calc(100vh - 160px);
            min-height: 500px;
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        /* Canvas (SVG Drawing Area) */
        .canvas-container {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s;
        }

        .canvas-container:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .canvas-placeholder {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-muted);
            padding: 40px;
        }

        .canvas-placeholder h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        /* Info Explanation Panel */
        .info-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .info-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .info-title {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-body {
            line-height: 1.6;
            color: var(--text-muted);
            font-size: 14px;
        }

        .info-body p {
            margin: 0 0 12px 0;
        }

        /* Custom scrollbar styling for webkit */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-focus);
        }

        /* Animation */
        .tab-content-wrapper {
            width: 100%;
            height: 100%;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sparse Attention RTL 電路與架構分析</h1>
        <span class="version-badge">RTL IMPLEMENTATION v1.0.0</span>
    </header>

    <div class="tabs" id="tab-nav"></div>

    <div class="dashboard">
        <div class="canvas-container" id="canvas-area">
            <!-- SVG / Canvas content rendering dynamically -->
        </div>
        <div class="info-panel" id="info-area">
            <!-- Explanation content rendering dynamically -->
        </div>
    </div>

    <script>
        // Tab Configuration
        const tabsConfig = [
            { id: 'overview', name: 'Overview (系統總覽)' },
            { id: 'pair_streamer', name: 'Pair Streamer (索引產生器)' },
            { id: 'feature_mem', name: 'Feature Memory (特徵記憶體)' },
            { id: 'dot_accum', name: 'Dot Accumulator (點積管線)' },
            { id: 'softmax_context', name: 'Softmax & Context (權重與除法)' },
            { id: 'stats_fifo', name: 'Stats & Result FIFO' }
        ];

        // Tab initialization
        function initTabs() {
            const nav = document.getElementById('tab-nav');
            tabsConfig.forEach((tab, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.textContent = tab.name;
                btn.onclick = () => switchTab(tab.id);
                btn.dataset.id = tab.id;
                nav.appendChild(btn);
            });
            
            // Render initial tab content
            switchTab('overview');
        }

        // Switch active tab
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.id === tabId);
            });
            renderContent(tabId);
        }

        // Render mockup content to verify UI framework works
        function renderContent(tabId) {
            const canvasArea = document.getElementById('canvas-area');
            const infoArea = document.getElementById('info-area');
            
            const activeTab = tabsConfig.find(t => t.id === tabId);
            
            // Set dynamic canvas area mockup
            canvasArea.innerHTML = `
                <div class="tab-content-wrapper canvas-placeholder">
                    <h2>${activeTab.name} - 電路架構圖</h2>
                    <div style="font-size: 14px; margin-top: 10px; opacity: 0.6; line-height: 1.8;">
                        [ 互動式 SVG 電路圖區域 ]<br>
                        系統檢測到前台 Tab: <span style="color: #3b82f6; font-weight: bold;">${tabId}</span> 已成功啟動。<br>
                        電路連線、波形及暫存器視窗將在後續 Task 中完成實作。
                    </div>
                </div>
            `;
            
            // Set dynamic explanation info area mockup
            infoArea.innerHTML = `
                <div class="tab-content-wrapper">
                    <div class="info-header">
                        <h2 class="info-title">
                            <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:#3b82f6; box-shadow: 0 0 8px #3b82f6;"></span>
                            ${activeTab.name} 詳細說明
                        </h2>
                    </div>
                    <div class="info-body">
                        <p>這是 <strong>${activeTab.name}</strong> 的架構與說明區塊。本頁籤對應的硬體 RTL 電路包含以下特點：</p>
                        <ul style="padding-left: 20px; line-height: 1.8; margin-top: 10px;">
                            <li>模組識別標識符: <code style="font-family: monospace; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; color: #f8fafc;">${tabId}</code></li>
                            <li>自適應介面握手訊號：支援同步時脈與複位設定。</li>
                            <li>管線式架構：高吞吐量設計以加速晶片內運算效率。</li>
                        </ul>
                        <p style="margin-top: 16px; font-size: 13px; color: var(--text-muted);">請點擊上方導覽列切換不同頁籤以測試 Tab 切換功能。</p>
                    </div>
                </div>
            `;
        }

        // Bind onload
        window.onload = initTabs;
    </script>
</body>
</html>
